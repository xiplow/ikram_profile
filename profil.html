<!DOCTYPE html>
<html>
<head>
  <title>Profil</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .profile-img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 25px rgba(255,255,255,0.7);
      margin-bottom: 10px;
    }

    .typing {
      font-size: 14px;
      margin-bottom: 15px;
      height: 20px;
    }

    .info div {
      margin: 8px 0;
      padding: 10px;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    .info div:hover {
      background: rgba(255,255,255,0.3);
      transform: translateX(5px);
    }

    /* Popup */
    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
    }
  </style>
</head>

<body class="center">

<div class="card">
  <img id="foto" class="profile-img">
  <h2 id="nama"></h2>

  <div class="typing" id="typing"></div>

  <div class="info">
    <div onclick="showPopup('Universitas')">👨🏻‍🎓 UNIVERSITAS</div>
    <div onclick="showPopup('Hobi')">🎯 HOBI</div>
    <div onclick="showPopup('Makanan Kesukaan')">🍕 MAKANAN KESUKAAN</div>
    <div onclick="showPopup('Fun Fact')">🤓 FUN FACT</div>
  </div>

  <button onclick="kembali()">Kembali</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3 id="title"></h3>
    <p id="isi"></p>
    <button onclick="closePopup()">Tutup</button>
  </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("orang"));
let index = localStorage.getItem("detail");

let user = data[index];

// TAMPIL DATA
document.getElementById("Nama").innerHTML = user.nama;
document.getElementById("foto").src = user.foto;

// TYPING EFFECT
const text = ["Profil Pengguna 👤", "Data Diri 📄", "Interaktif 🔥"];
let i = 0, j = 0, current = "", hapus = false;

function typing(){
  if(i >= text.length) i = 0;

  if(!hapus){
    current = text[i].substring(0, j++);
  } else {
    current = text[i].substring(0, j--);
  }

  document.getElementById("typing").innerHTML = current;

  if(!hapus && j === text[i].length){
    hapus = true;
    setTimeout(typing, 1000);
    return;
  }

  if(hapus && j === 0){
    hapus = false;
    i++;
  }

  setTimeout(typing, hapus ? 50 : 100);
}

typing();

// POPUP
function showPopup(type){
  let title = "";
  let isi = "";

  if(type === "Universitas"){
    title = "👨🏻‍🎓 Universitas";
    isi = user.universitas;
  }

  if(type === "Hobi"){
    title = "🎯 Hobi";
    isi = user.hobi;
  }
  if(type === "Makanan Kesukaan"){
    title = "🍕 Makanan Kesukaan";
    isi = user.makanan_kesukaan;
  }
  if(type === "Fun Fact"){
    title = "🤓 Fun Fact";
    isi = user.fun_fact;
  }

  document.getElementById("title").innerHTML = title;
  document.getElementById("isi").innerHTML = isi;
  document.getElementById("popup").style.display = "flex";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

function kembali(){
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
