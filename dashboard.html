<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
</head>
<body>
    <h1>Dashboard</h1>
    <form>
        <input type="text" id="nama" placeholder="Enter name"/>
        <input type="text" id="hobi" placeholder="Enter hobby"/>
        <input type="text" id="makanan_kesukaan" placeholder="Enter favorite food"/>
        <input type="text" id="fun_fact" placeholder="Enter fun fact"/>
        <button type="button" onclick="saveData()">Simpan</button>
    </form>
    <script>
        function saveData() {
            var nama = document.getElementById('nama').value;
            var hobi = document.getElementById('hobi').value;
            var makananKesukaan = document.getElementById('makanan_kesukaan').value;
            var funFact = document.getElementById('fun_fact').value;

            // Add your save logic here
            console.log(nama, hobi, makananKesukaan, funFact);
        }
    </script>
</body>
</html>
